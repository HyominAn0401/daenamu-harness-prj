global:
  imageRegistry: hub.daenamu.local:8083
  imageProject: daenamu
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

defaults:
  replicas: 1
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  probes:
    enabled: true
    path: /actuator/health
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6

services:
  catalog:
    enabled: true
    replicas: 1
    image:
      repository: catalog
      tag: local
    service:
      type: ClusterIP
      port: 8080
      targetPort: 8080
    probes:
      path: /actuator/health
    env:
      EPISODE_BASE_URL: http://episode:8081
      JAVA_TOOL_OPTIONS: -javaagent:/app/opentelemetry-javaagent.jar
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger-collector.observability:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger-collector.observability:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_SERVICE_NAME: catalog
      OTEL_TRACES_EXPORTER: otlp

  episode:
    enabled: true
    replicas: 1
    image:
      repository: episode
      tag: local
    service:
      type: ClusterIP
      port: 8081
      targetPort: 8081
    probes:
      path: /actuator/health
    env:
      PLAYBACK_BASE_URL: http://playback:8082
      JAVA_TOOL_OPTIONS: -javaagent:/app/opentelemetry-javaagent.jar
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger-collector.observability:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger-collector.observability:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_SERVICE_NAME: episode
      OTEL_TRACES_EXPORTER: otlp

  playback:
    enabled: true
    replicas: 1
    image:
      repository: playback
      tag: local
    service:
      type: ClusterIP
      port: 8082
      targetPort: 8082
    probes:
      path: /actuator/health
    env:
      JAVA_TOOL_OPTIONS: -javaagent:/app/opentelemetry-javaagent.jar
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger-collector.observability:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger-collector.observability:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_SERVICE_NAME: playback
      OTEL_TRACES_EXPORTER: otlp

  frontend:
    enabled: true
    replicas: 1
    image:
      repository: frontend
      tag: local
    service:
      type: ClusterIP
      port: 80
      targetPort: 80
    probes:
      enabled: false
    env: {}
