{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: daenamu
spec:
  replicas: {{ default $.Values.defaults.replicas $svc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/part-of: daenamu
    spec:
      {{- if $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range $.Values.global.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "daenamu.image" (list $ $svc) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.service.targetPort }}
          {{- $probeConfig := default dict $svc.probes }}
          {{- $probeEnabled := $.Values.defaults.probes.enabled }}
          {{- if hasKey $probeConfig "enabled" }}
          {{- $probeEnabled = $probeConfig.enabled }}
          {{- end }}
          {{- if $probeEnabled }}
          {{- $probePath := default $.Values.defaults.probes.path $probeConfig.path }}
          readinessProbe:
            httpGet:
              path: {{ $probePath }}
              port: http
            initialDelaySeconds: {{ $.Values.defaults.probes.initialDelaySeconds }}
            periodSeconds: {{ $.Values.defaults.probes.periodSeconds }}
            timeoutSeconds: {{ $.Values.defaults.probes.timeoutSeconds }}
            failureThreshold: {{ $.Values.defaults.probes.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ $probePath }}
              port: http
            initialDelaySeconds: {{ $.Values.defaults.probes.initialDelaySeconds }}
            periodSeconds: {{ $.Values.defaults.probes.periodSeconds }}
            timeoutSeconds: {{ $.Values.defaults.probes.timeoutSeconds }}
            failureThreshold: {{ $.Values.defaults.probes.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml $.Values.defaults.resources | nindent 12 }}
          {{- if $svc.env }}
          env:
            {{- range $envName, $envValue := $svc.env }}
            - name: {{ $envName }}
              value: {{ $envValue | quote }}
            {{- end }}
          {{- end }}
---
{{- end }}
{{- end }}
