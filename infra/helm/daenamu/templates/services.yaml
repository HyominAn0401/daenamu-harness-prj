{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: daenamu
spec:
  type: {{ default $.Values.defaults.service.type $svc.service.type }}
  selector:
    app.kubernetes.io/name: {{ $name }}
  ports:
    - name: http
      port: {{ $svc.service.port }}
      targetPort: {{ $svc.service.targetPort }}
---
{{- end }}
{{- end }}
