spring.application.name=catalog
server.port=8080

daenamu.episode.base-url=${EPISODE_BASE_URL:http://localhost:8081}

spring.datasource.url=${CATALOG_DB_URL:jdbc:h2:mem:catalogdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${CATALOG_DB_USERNAME:sa}
spring.datasource.password=${CATALOG_DB_PASSWORD:}
spring.datasource.driver-class-name=${CATALOG_DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
