spring.datasource.url=${CATALOG_DB_URL:jdbc:mysql://localhost:3306/catalog}
spring.datasource.username=${CATALOG_DB_USERNAME:catalog}
spring.datasource.password=${CATALOG_DB_PASSWORD:catalog}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false
