spring.application.name=episode
server.port=8081

daenamu.playback.base-url=${PLAYBACK_BASE_URL:http://localhost:8082}

spring.datasource.url=${EPISODE_DB_URL:jdbc:h2:mem:episodedb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${EPISODE_DB_USERNAME:sa}
spring.datasource.password=${EPISODE_DB_PASSWORD:}
spring.datasource.driver-class-name=${EPISODE_DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
